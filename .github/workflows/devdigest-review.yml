name: DevDigest Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Rapid pushes to the same PR cancel any in-flight review, avoiding duplicate
# comments and wasted model spend.
concurrency:
  group: devdigest-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Same-repo branch PRs get secrets + a writable token; external-fork PRs
# do not (the post step is then skipped). See the DevDigest fork model.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./agent-runner
        with:
          agent: security-reviewer
          post: github-review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: devdigest-result
          path: devdigest-result.json
          if-no-files-found: ignore
